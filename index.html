<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Christmas Tree</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Times+New+Roman&display=swap" rel="stylesheet">

    <!-- Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>

    <style>
        :root {
            --color-gold: #d4af37;
            --color-cream: #fceea7;
            --color-bg: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--color-bg);
            font-family: 'Times New Roman', serif;
            user-select: none;
        }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas if needed, but we handle UI elements separately */
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .ui-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Header */
        h1 {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 56px;
            margin: 0;
            font-weight: 700;
            background: linear-gradient(to bottom, #ffffff, var(--color-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
            pointer-events: auto;
        }

        /* Custom Message Container */
        #msg-container {
            position: absolute;
            top: 100px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
            transition: opacity 0.3s ease;
            z-index: 25;
        }

        #drag-handle {
            color: var(--color-gold);
            font-size: 24px;
            cursor: move;
            opacity: 0.4;
            transition: opacity 0.2s;
            user-select: none;
        }

        #msg-container:hover #drag-handle {
            opacity: 1;
        }

        #custom-text {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(to bottom, #ffffff, var(--color-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
            border: none;
            outline: none;
            min-width: 50px;
            cursor: text;
        }

        #custom-text:empty:before {
            content: 'Type your wish...';
            color: rgba(255,255,255,0.3);
            -webkit-text-fill-color: rgba(255,255,255,0.3);
        }

        /* Controls */
        .controls-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }

        .upload-wrapper {
            position: relative;
            overflow: hidden;
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
            padding: 12px 30px;
            font-family: 'Cinzel', serif;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            outline: none;
        }

        .btn-glass:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* Hide file input */
        #file-input {
            position: absolute;
            font-size: 100px;
            opacity: 0;
            right: 0;
            top: 0;
            cursor: pointer;
        }

        .hint-text {
            color: rgba(252, 238, 167, 0.6);
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        /* Webcam Container */
        #webcam-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            z-index: 20;
            border: 2px solid var(--color-gold);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 1; 
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        #webcam-container.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* transform removed to allow correct text rendering. We mirror coords in JS */
            pointer-events: none;
        }

        /* Camera Toggle Button */
        #cam-toggle-btn {
            position: absolute;
            bottom: 210px; /* Positioned above the video window */
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--color-gold);
            color: var(--color-gold);
            font-size: 18px;
            cursor: pointer;
            z-index: 21;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            outline: none;
        }

        #cam-toggle-btn:hover {
            background: var(--color-gold);
            color: #000;
            box-shadow: 0 0 10px var(--color-gold);
        }

        /* Loader */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            border-top: 3px solid var(--color-gold);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loader-text {
            color: var(--color-gold);
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            font-size: 14px;
            animation: pulse 2s infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Canvas */
        canvas {
            display: block;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">LOADING HOLIDAY MAGIC</div>
    </div>

    <!-- UI -->
    <div id="ui-layer">
        <h1>Merry Christmas</h1>
        
        <!-- Custom Draggable Message -->
        <div id="msg-container">
            <div id="drag-handle" title="Drag to move">✥</div>
            <div id="custom-text" contenteditable="true" spellcheck="false">Make a Wish...</div>
        </div>
        
        <div class="controls-container">
            <div class="upload-wrapper">
                <button class="btn-glass">ADD MEMORIES</button>
                <input type="file" id="file-input" accept="image/*">
            </div>
            <div class="hint-text">Press 'H' to Hide Controls</div>
        </div>
    </div>

    <!-- Camera Toggle Button -->
    <button id="cam-toggle-btn" title="Toggle Camera View">📷</button>

    <!-- Webcam Container -->
    <div id="webcam-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
        import { FilesetResolver, HandLandmarker } from '@mediapipe/tasks-vision';

        // --- GLOBAL CONFIGURATION ---
        const CONFIG = {
            colors: {
                gold: 0xd4af37,
                cream: 0xfceea7,
                red: 0xcc0000,
                green: 0x004d00,
                blue: 0x0000ff,
                orange: 0xffaa00
            },
            particleCount: 1500,
            dustCount: 2500,
            modes: {
                TREE: 'TREE',
                SCATTER: 'SCATTER',
                FOCUS: 'FOCUS'
            }
        };

        // --- STATE MACHINE ---
        const STATE = {
            mode: CONFIG.modes.TREE,
            lastMode: CONFIG.modes.TREE,
            handDetected: false,
            rotationTarget: { x: 0, y: 0 },
            focusedParticle: null,
            uiVisible: true,
            msgVisible: true,
            camVisible: true,
            time: 0
        };

        // --- SCENE VARIABLES ---
        let camera, scene, renderer, composer, controls;
        let mainGroup, particles = [], dustSystem, starMesh;
        let handLandmarker;
        let videoElement, webcamRunning = false;
        let canvasElement, canvasCtx;

        // --- PARTICLE SYSTEM ---
        class Particle {
            constructor(mesh, index, total, type) {
                this.mesh = mesh;
                this.index = index;
                this.type = type;
                this.originalScale = mesh.scale.clone();
                
                // Rotation velocity for SCATTER mode
                this.rotVelocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                );

                // Tree Position (Spiral Cone)
                const t = index / total; // 0 to 1
                const angle = t * 50 * Math.PI;
                const maxRadius = 12;
                const y = t * 25 - 10; // -10 to 15
                const r = maxRadius * (1 - t);
                
                this.treePos = new THREE.Vector3(
                    Math.cos(angle) * r,
                    y,
                    Math.sin(angle) * r
                );

                // Scatter Position (Sphere shell)
                const u = Math.random();
                const v = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);
                const scatterR = 8 + Math.random() * 12;
                
                this.scatterPos = new THREE.Vector3(
                    scatterR * Math.sin(phi) * Math.cos(theta),
                    scatterR * Math.sin(phi) * Math.sin(theta),
                    scatterR * Math.cos(phi)
                );
            }

            update(mode, focusedInstance) {
                let targetPos = new THREE.Vector3();
                let targetScale = this.originalScale.clone();
                let targetRot = this.mesh.rotation.clone(); // Keep current unless modified

                if (mode === CONFIG.modes.TREE) {
                    targetPos.copy(this.treePos);
                    // Standard rotation align to center mostly, but we'll leave it random-ish or fixed
                    this.mesh.rotation.x = THREE.MathUtils.lerp(this.mesh.rotation.x, 0, 0.05);
                    this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, 0, 0.05);

                } else if (mode === CONFIG.modes.SCATTER) {
                    targetPos.copy(this.scatterPos);
                    // Rotate based on velocity
                    this.mesh.rotation.x += this.rotVelocity.x;
                    this.mesh.rotation.y += this.rotVelocity.y;
                    this.mesh.rotation.z += this.rotVelocity.z;
                
                } else if (mode === CONFIG.modes.FOCUS) {
                    if (this === focusedInstance) {
                        // FIX: Calculate local position needed to be in front of camera in world space
                        // This counteracts the group rotation
                        const worldTarget = new THREE.Vector3(0, 2, 38); // 12 units in front of camera (50)
                        
                        targetPos.copy(worldTarget);
                        if (this.mesh.parent) {
                            this.mesh.parent.worldToLocal(targetPos);
                        }

                        // Look at camera
                        this.mesh.lookAt(camera.position);
                        targetScale.multiplyScalar(4.5);
                    } else {
                        // Background particles push away slightly or hold scatter
                        targetPos.copy(this.scatterPos).multiplyScalar(1.2);
                        this.mesh.rotation.x += this.rotVelocity.x * 0.5;
                        this.mesh.rotation.y += this.rotVelocity.y * 0.5;
                    }
                }

                // Lerp Movement
                this.mesh.position.lerp(targetPos, 0.1); // Slightly faster lerp for focus
                this.mesh.scale.lerp(targetScale, 0.05);
            }
        }
        
        // --- INITIALIZATION ---
        init();

        async function init() {
            // 1. Scene & Camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 50);

            // 2. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 2.2;
            document.body.appendChild(renderer.domElement);

            // 3. Environment & Lights
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const innerLight = new THREE.PointLight(CONFIG.colors.orange, 2, 20);
            innerLight.position.set(0, 5, 0);
            scene.add(innerLight);

            const spotGold = new THREE.SpotLight(CONFIG.colors.gold, 1200);
            spotGold.position.set(30, 40, 40);
            spotGold.angle = Math.PI / 6;
            scene.add(spotGold);

            const spotBlue = new THREE.SpotLight(CONFIG.colors.blue, 600);
            spotBlue.position.set(-30, 20, -30);
            spotBlue.angle = Math.PI / 6;
            scene.add(spotBlue);

            // 4. Post Processing
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.7;
            bloomPass.strength = 0.45;
            bloomPass.radius = 0.4;

            const outputPass = new OutputPass();

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            composer.addPass(outputPass);

            // 5. Orbit Controls (Optional backup for mouse)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            // 6. Content Generation
            mainGroup = new THREE.Group();
            scene.add(mainGroup);

            // Create Star
            starMesh = createStar();

            // Procedural Textures
            const candyTexture = createCandyCaneTexture();
            const defaultPhotoTexture = createTextTexture("JOYEUX NOEL");

            // Materials
            const mats = {
                gold: new THREE.MeshStandardMaterial({ color: CONFIG.colors.gold, metalness: 0.8, roughness: 0.2 }),
                green: new THREE.MeshStandardMaterial({ color: CONFIG.colors.green, roughness: 0.8 }),
                redPhys: new THREE.MeshPhysicalMaterial({ color: CONFIG.colors.red, metalness: 0.1, roughness: 0.1, clearcoat: 1.0 }),
                goldPhys: new THREE.MeshPhysicalMaterial({ color: CONFIG.colors.gold, metalness: 0.7, roughness: 0.2, clearcoat: 1.0 }),
                candy: new THREE.MeshStandardMaterial({ map: candyTexture, roughness: 0.4 }),
                photoFrame: new THREE.MeshStandardMaterial({ color: CONFIG.colors.gold, metalness: 0.9, roughness: 0.1 })
            };

            // Geometries
            const geos = {
                box: new THREE.BoxGeometry(0.5, 0.5, 0.5),
                sphere: new THREE.SphereGeometry(0.3, 16, 16),
                cane: createCandyCaneGeometry(),
                frame: new THREE.BoxGeometry(1.6, 1.2, 0.1), // Frame
                photoPlane: new THREE.PlaneGeometry(1.4, 1.0) // Photo inside
            };

            // Initialize Particles
            for (let i = 0; i < CONFIG.particleCount; i++) {
                let mesh, type = 'DECO';
                const rand = Math.random();

                if (i === 0) {
                    // First one is the default photo
                    mesh = createPhotoMesh(defaultPhotoTexture, geos.frame, geos.photoPlane, mats.photoFrame);
                    type = 'TITLE'; // Set as TITLE to exclude from focus random selection
                } else if (rand < 0.15) {
                    mesh = new THREE.Mesh(geos.cane, mats.candy);
                    mesh.scale.setScalar(0.05); // Tube is big
                } else if (rand < 0.5) {
                    mesh = new THREE.Mesh(geos.box, Math.random() > 0.5 ? mats.gold : mats.green);
                } else {
                    mesh = new THREE.Mesh(geos.sphere, Math.random() > 0.5 ? mats.goldPhys : mats.redPhys);
                }

                // Create Particle Class Instance
                const p = new Particle(mesh, i, CONFIG.particleCount, type);
                particles.push(p);
                mainGroup.add(mesh);
            }

            // Dust
            createDust();

            // 7. Event Listeners
            setupEventListeners();
            
            // File Upload
            setupFileUpload();

            // 8. MediaPipe Setup
            await setupMediaPipe();

            // 9. Remove Loader
            const loader = document.getElementById('loader');
            loader.style.opacity = 0;
            setTimeout(() => loader.remove(), 1000);

            // 10. Start Loop
            animate();
        }

        // --- HELPER FUNCTIONS ---

        function setupEventListeners() {
            window.addEventListener('resize', onWindowResize);
            
            // Keyboard Controls
            window.addEventListener('keydown', (e) => {
                // Ignore if typing in custom text
                if (document.activeElement === document.getElementById('custom-text')) return;

                const key = e.key.toLowerCase();
                if (key === 'h') {
                    STATE.uiVisible = !STATE.uiVisible;
                    const ui = document.getElementById('ui-layer');
                    // We only want to hide specific UI elements, not the whole layer if message is there
                    // But spec says "hide controls". We'll toggle the controls container class.
                    const controls = document.querySelector('.controls-container');
                    const title = document.querySelector('h1');
                    if(STATE.uiVisible) {
                         controls.classList.remove('ui-hidden');
                         title.classList.remove('ui-hidden');
                    } else {
                         controls.classList.add('ui-hidden');
                         title.classList.add('ui-hidden');
                    }
                }
                
                if (key === 'g') {
                    STATE.msgVisible = !STATE.msgVisible;
                    const msg = document.getElementById('msg-container');
                    if (STATE.msgVisible) msg.classList.remove('ui-hidden');
                    else msg.classList.add('ui-hidden');
                }
            });

            // Prevent shortcuts when typing
            document.getElementById('custom-text').addEventListener('keydown', (e) => {
                e.stopPropagation();
            });

            // Dragging Logic
            const msgContainer = document.getElementById('msg-container');
            const dragHandle = document.getElementById('drag-handle');
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            dragHandle.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                initialLeft = msgContainer.offsetLeft;
                initialTop = msgContainer.offsetTop;
                document.body.style.cursor = 'move';
                e.preventDefault();
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                msgContainer.style.left = `${initialLeft + dx}px`;
                msgContainer.style.top = `${initialTop + dy}px`;
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                document.body.style.cursor = 'default';
            });

            // Camera Toggle
            document.getElementById('cam-toggle-btn').addEventListener('click', () => {
                STATE.camVisible = !STATE.camVisible;
                const camContainer = document.getElementById('webcam-container');
                if (STATE.camVisible) {
                    camContainer.classList.remove('hidden');
                } else {
                    camContainer.classList.add('hidden');
                }
            });
        }

        function createStar() {
            const shape = new THREE.Shape();
            const points = 5;
            const outerRadius = 1.2;
            const innerRadius = 0.5;
            
            for (let i = 0; i < points * 2; i++) {
                const r = (i % 2 === 0) ? outerRadius : innerRadius;
                const a = (i / (points * 2)) * Math.PI * 2;
                const x = Math.cos(a + Math.PI / 2) * r;
                const y = Math.sin(a + Math.PI / 2) * r;
                if (i === 0) shape.moveTo(x, y);
                else shape.lineTo(x, y);
            }
            
            const geom = new THREE.ExtrudeGeometry(shape, {
                depth: 0.4,
                bevelEnabled: true,
                bevelThickness: 0.1,
                bevelSize: 0.05,
                bevelSegments: 2
            });
            
            const mat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                emissive: 0xffaa00,
                emissiveIntensity: 1.5,
                roughness: 0.2,
                metalness: 1.0
            });
            
            const star = new THREE.Mesh(geom, mat);
            // Tree top is roughly y=15 based on particle logic (25 - 10)
            star.position.set(0, 15.5, 0); 
            mainGroup.add(star);
            
            // Add a point light specifically for the star to make it glow
            const starLight = new THREE.PointLight(0xffaa00, 5, 20);
            starLight.position.set(0, 15.5, 0);
            mainGroup.add(starLight);

            return star;
        }

        function createCandyCaneGeometry() {
            const path = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, -2, 0),
                new THREE.Vector3(0, 2, 0),
                new THREE.Vector3(0, 2.5, 0.5),
                new THREE.Vector3(0, 2.0, 1.2)
            ]);
            return new THREE.TubeGeometry(path, 20, 0.15, 8, false);
        }

        function createCandyCaneTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = '#ff0000';
            for (let i = 0; i < 10; i++) {
                ctx.beginPath();
                ctx.moveTo(i * 20 - 50, 0);
                ctx.lineTo(i * 20 + 10 - 50, 0);
                ctx.lineTo(i * 20 + 10 + 128 - 50, 128);
                ctx.lineTo(i * 20 + 128 - 50, 128);
                ctx.fill();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 360;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#FCEEA7'; // Cream
            ctx.fillRect(0, 0, 512, 360);
            
            ctx.font = 'bold 60px Cinzel';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#D4AF37'; // Gold
            ctx.fillText(text, 256, 180);
            
            // Add decorative border
            ctx.strokeStyle = '#D4AF37';
            ctx.lineWidth = 10;
            ctx.strokeRect(20, 20, 472, 320);

            const t = new THREE.CanvasTexture(canvas);
            t.colorSpace = THREE.SRGBColorSpace;
            return t;
        }

        function createPhotoMesh(texture, frameGeo, planeGeo, frameMat) {
            const group = new THREE.Group();
            
            const frame = new THREE.Mesh(frameGeo, frameMat);
            const photoMat = new THREE.MeshBasicMaterial({ map: texture });
            const photo = new THREE.Mesh(planeGeo, photoMat);
            photo.position.z = 0.06; // Slightly in front of frame

            // Combine into a wrapper mesh to act as the single object for the Particle class
            // But since Group doesn't have geometry, we attach to frame and add photo as child
            frame.add(photo);
            return frame;
        }

        function createDust() {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < CONFIG.dustCount; i++) {
                vertices.push((Math.random() - 0.5) * 60);
                vertices.push((Math.random() - 0.5) * 60);
                vertices.push((Math.random() - 0.5) * 60);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const material = new THREE.PointsMaterial({ 
                color: CONFIG.colors.gold, 
                size: 0.15,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            dustSystem = new THREE.Points(geometry, material);
            scene.add(dustSystem);
        }

        function setupFileUpload() {
            const fileInput = document.getElementById('file-input');
            fileInput.addEventListener('change', (e) => {
                const f = e.target.files[0];
                if (!f) return;
                
                const reader = new FileReader();
                // 监听 input change 事件 - Precise Implementation
                reader.onload = (ev) => {
                    new THREE.TextureLoader().load(ev.target.result, (t) => {
                        t.colorSpace = THREE.SRGBColorSpace; // 关键：指定色彩空间
                        addPhotoToScene(t);
                    });
                }
                reader.readAsDataURL(f);
            });
        }

        function addPhotoToScene(texture) {
            // Calculate aspect ratio to avoid stretching
            const img = texture.image;
            let width = 1.4;
            let height = 1.0;
            
            if (img && img.width && img.height) {
                const aspect = img.width / img.height;
                height = 1.0; // Base height
                width = height * aspect;
            }

            // Create dynamic geometry for this specific photo
            const dynamicFrameGeo = new THREE.BoxGeometry(width + 0.2, height + 0.2, 0.1);
            const dynamicPlaneGeo = new THREE.PlaneGeometry(width, height);
            
            const mats = {
                photoFrame: new THREE.MeshStandardMaterial({ color: CONFIG.colors.gold, metalness: 0.9, roughness: 0.1 })
            };

            const mesh = createPhotoMesh(texture, dynamicFrameGeo, dynamicPlaneGeo, mats.photoFrame);
            
            // Add to scene
            mainGroup.add(mesh);

            // Create new particle
            const index = particles.length;
            const p = new Particle(mesh, index, CONFIG.particleCount + 1, 'PHOTO');
            particles.push(p);

            // Trigger focus on this new photo
            STATE.focusedParticle = p;
            STATE.mode = CONFIG.modes.FOCUS;
            
            console.log("Memory added with aspect ratio!");
        }

        // --- MEDIAPIPE ---
        async function setupMediaPipe() {
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });

                videoElement = document.getElementById("webcam");
                canvasElement = document.getElementById("output_canvas");
                canvasCtx = canvasElement.getContext("2d");
                
                // Get Camera
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement.srcObject = stream;
                videoElement.addEventListener("loadeddata", () => {
                    // Sync canvas size to video size
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                    webcamRunning = true;
                    // Start detection loop independent of render loop
                    predictWebcam();
                });

            } catch (error) {
                console.error("MediaPipe initialization error:", error);
            }
        }

        async function predictWebcam() {
            if (handLandmarker && webcamRunning) {
                let startTimeMs = performance.now();
                const results = handLandmarker.detectForVideo(videoElement, startTimeMs);
                
                processGestures(results);
                
                requestAnimationFrame(predictWebcam);
            }
        }

        function processGestures(results) {
            let gestureLabel = "SEARCHING...";
            let metrics = { pinch: 0, spread: 0 };
            let detected = false;

            if (results.landmarks && results.landmarks.length > 0) {
                STATE.handDetected = true;
                detected = true;
                const landmarks = results.landmarks[0]; // First hand

                // Indices: Wrist(0), Thumb(4), Index(8), Tip12, Tip16, Tip20
                // Coordinates are normalized 0-1

                // 1. Interaction Mapping (Palm Center - approx 9)
                // Map 0-1 to Rotation angles
                const palm = landmarks[9];
                STATE.rotationTarget.y = (palm.x - 0.5) * 2.0; // -1 to 1 range (approx rad)
                STATE.rotationTarget.x = (palm.y - 0.5) * 2.0;

                // 2. Gesture Recognition
                const thumb = landmarks[4];
                const index = landmarks[8];
                const wrist = landmarks[0];
                const tips = [landmarks[12], landmarks[16], landmarks[20]];

                // Distance calculation helper (3d distance approx using x,y,z)
                const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y, p1.z - p2.z);

                // Pinch (Thumb to Index)
                const pinchDist = dist(thumb, index);
                metrics.pinch = pinchDist;
                
                // Average tip distance to wrist (Open vs Fist)
                let avgTipDist = 0;
                tips.forEach(t => avgTipDist += dist(t, wrist));
                avgTipDist /= tips.length;
                metrics.spread = avgTipDist;

                // State Switching Logic
                if (pinchDist < 0.05) {
                    gestureLabel = "PINCH";
                    if (STATE.mode !== CONFIG.modes.FOCUS) {
                        // Select random photo
                        const photos = particles.filter(p => p.type === 'PHOTO');
                        if (photos.length > 0) {
                             STATE.mode = CONFIG.modes.FOCUS;
                             STATE.focusedParticle = photos[Math.floor(Math.random() * photos.length)];
                        }
                    }
                } else if (avgTipDist < 0.25) {
                    gestureLabel = "FIST";
                    STATE.mode = CONFIG.modes.TREE;
                } else if (avgTipDist > 0.4) {
                    gestureLabel = "OPEN HAND";
                    STATE.mode = CONFIG.modes.SCATTER;
                } else {
                    gestureLabel = "TRACKING";
                }

                drawResults(landmarks, gestureLabel, metrics);

            } else {
                STATE.handDetected = false;
                drawResults(null, "NO HAND", null);
            }
        }

        function drawResults(landmarks, gesture, metrics) {
            const w = canvasElement.width;
            const h = canvasElement.height;
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, w, h);
            
            // Draw Analysis Text
            canvasCtx.fillStyle = '#d4af37';
            canvasCtx.shadowColor = 'black';
            canvasCtx.shadowBlur = 4;
            canvasCtx.font = 'bold 20px Courier New';
            
            canvasCtx.fillText(`STATUS: ${gesture}`, 10, 30);
            if (metrics) {
                canvasCtx.font = '16px Courier New';
                canvasCtx.fillStyle = '#fceea7';
                canvasCtx.fillText(`Pinch Dist: ${metrics.pinch.toFixed(3)}`, 10, 55);
                canvasCtx.fillText(`Finger Spr: ${metrics.spread.toFixed(3)}`, 10, 75);
                
                // Draw dynamic bars for metrics
                const barH = 6;
                const barMax = 100;
                
                // Pinch Bar
                canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                canvasCtx.fillRect(180, 45, barMax, barH);
                canvasCtx.fillStyle = metrics.pinch < 0.05 ? '#00ff00' : '#d4af37';
                canvasCtx.fillRect(180, 45, Math.min(metrics.pinch * 500, barMax), barH); // scale metric

                // Spread Bar
                canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                canvasCtx.fillRect(180, 65, barMax, barH);
                canvasCtx.fillStyle = metrics.spread > 0.4 ? '#00ff00' : (metrics.spread < 0.25 ? '#ff0000' : '#d4af37');
                canvasCtx.fillRect(180, 65, Math.min(metrics.spread * 200, barMax), barH);
            }
            
            // Draw Landmarks Skeleton
            if(landmarks) {
                // Connections
                const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,13],[13,17],[0,17],[17,18],[18,19],[19,20],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16]];
                
                canvasCtx.lineWidth = 2;
                canvasCtx.strokeStyle = 'rgba(252, 238, 167, 0.8)'; // Cream
                
                const getCoord = (idx) => {
                    return {
                        x: (1 - landmarks[idx].x) * w, // Mirroring X to match user view
                        y: landmarks[idx].y * h
                    };
                }
                
                // Bones
                canvasCtx.beginPath();
                connections.forEach(pair => {
                    const p1 = getCoord(pair[0]);
                    const p2 = getCoord(pair[1]);
                    canvasCtx.moveTo(p1.x, p1.y);
                    canvasCtx.lineTo(p2.x, p2.y);
                });
                canvasCtx.stroke();
                
                // Joints
                for(let i=0; i<landmarks.length; i++) {
                    const p = getCoord(i);
                    canvasCtx.beginPath();
                    // Color code tips (4,8,12,16,20)
                    if([4,8,12,16,20].includes(i)) canvasCtx.fillStyle = '#ff0000';
                    else canvasCtx.fillStyle = '#d4af37';
                    
                    canvasCtx.arc(p.x, p.y, i === 0 ? 5 : 3, 0, 2*Math.PI);
                    canvasCtx.fill();
                }
            }
            canvasCtx.restore();
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            STATE.time += 0.01;

            // Animate Star
            if (starMesh) {
                starMesh.rotation.y += 0.02;
                // Gentle bobbing
                starMesh.position.y = 15.5 + Math.sin(STATE.time * 2) * 0.2;
            }

            // Update main group rotation
            if (STATE.handDetected) {
                // Interactive rotation
                mainGroup.rotation.y = THREE.MathUtils.lerp(mainGroup.rotation.y, STATE.rotationTarget.y, 0.1);
                mainGroup.rotation.x = THREE.MathUtils.lerp(mainGroup.rotation.x, STATE.rotationTarget.x, 0.1);
                controls.enabled = false;
            } else {
                // Auto rotation handled by OrbitControls if enabled, or manual here
                // Resetting X rot when hand leaves
                mainGroup.rotation.x = THREE.MathUtils.lerp(mainGroup.rotation.x, 0, 0.05);
                controls.enabled = true;
                controls.update();
            }
            
            // IMPORTANT: Update matrix world so worldToLocal calculations in particle update are accurate
            mainGroup.updateMatrixWorld();

            // Update Particles
            particles.forEach(p => p.update(STATE.mode, STATE.focusedParticle));

            // Animate Dust
            if (dustSystem) {
                dustSystem.rotation.y = STATE.time * 0.05;
                dustSystem.rotation.x = Math.sin(STATE.time * 0.05) * 0.1;
            }

            // Render
            composer.render();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
